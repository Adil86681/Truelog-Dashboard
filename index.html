<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Ticket Dashboard — TrueLog</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f172a; --surface: #1e293b; --border: #334155;
      --muted: #64748b; --subtle: #94a3b8; --text: #e2e8f0; --bright: #f1f5f9;
      --blue: #3b82f6; --green: #10b981; --amber: #f59e0b; --orange: #f97316;
      --purple: #8b5cf6; --cyan: #06b6d4; --red: #ef4444; --indigo: #6366f1;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* Header */
    .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; flex-shrink: 0; }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .pulse-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--green); box-shadow: 0 0 7px var(--green); animation: pulse 2s infinite; flex-shrink: 0; }
    .title { font-size: 17px; font-weight: 700; color: var(--bright); }
    .badge { background: var(--border); color: var(--subtle); padding: 2px 10px; border-radius: 99px; font-size: 12px; font-weight: 600; }
    .meta { color: var(--muted); font-size: 12px; }
    .btn { border: none; border-radius: 7px; padding: 6px 14px; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .15s; }
    .btn:hover { opacity: .82; }
    .btn-blue  { background: var(--blue); color: #fff; }
    .btn-ghost { background: var(--border); color: var(--subtle); }

    /* Stats */
    .stats { display: flex; gap: 10px; padding: 14px 24px; overflow-x: auto; flex-shrink: 0; background: var(--bg); }
    .stat { background: var(--surface); border-radius: 9px; padding: 12px 16px; min-width: 100px; border-left: 4px solid; flex-shrink: 0; cursor: pointer; transition: opacity .15s; }
    .stat:hover { opacity: .8; }
    .stat.active { outline: 2px solid var(--blue); outline-offset: 1px; }
    .stat-num { font-size: 24px; font-weight: 700; color: var(--bright); line-height: 1; }
    .stat-label { font-size: 11px; color: var(--subtle); margin-top: 4px; }

    /* Toolbar */
    .toolbar { padding: 12px 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-wrap: wrap; background: var(--bg); }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
    .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events: none; }
    .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 12px 8px 33px; border-radius: 7px; font-size: 13px; outline: none; transition: border-color .15s; }
    .search-input:focus { border-color: var(--blue); }
    .filter-sel { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 7px; font-size: 13px; outline: none; cursor: pointer; }
    .filter-sel:focus { border-color: var(--blue); }
    .results { color: var(--muted); font-size: 12px; margin-left: auto; }

    /* Table */
    .table-wrap { flex: 1; overflow: auto; padding: 0 24px 24px; }
    table { width: 100%; border-collapse: collapse; min-width: 780px; }
    thead th { position: sticky; top: 0; background: var(--bg); padding: 9px 12px; text-align: left; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 600; white-space: nowrap; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    thead th:hover { color: var(--text); }
    thead th.sorted { color: var(--blue); }
    .sort-icon { margin-left: 3px; opacity: .5; }
    .sorted .sort-icon { opacity: 1; }
    tbody tr { border-bottom: 1px solid #16213a; cursor: pointer; transition: background .1s; }
    tbody tr:hover { background: var(--surface); }
    tbody tr.hidden { display: none; }
    td { padding: 10px 12px; font-size: 13px; vertical-align: middle; }
    .td-id   { color: var(--subtle); font-size: 11px; white-space: nowrap; }
    .td-subj { color: var(--text); max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .td-date { color: var(--subtle); font-size: 12px; white-space: nowrap; }
    .pill { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 11px; font-weight: 600; white-space: nowrap; max-width: 200px; overflow: hidden; text-overflow: ellipsis; }

    /* Empty */
    .empty { display: none; text-align: center; padding: 50px; color: var(--muted); }
    .empty-icon { font-size: 36px; margin-bottom: 10px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--surface); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  </style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="pulse-dot" id="dot"></div>
    <span class="title">Live Ticket Dashboard</span>
    <span class="badge" id="totalBadge">40 tickets</span>
  </div>
  <div class="header-right">
    <span class="meta" id="lastUpdated">Loaded Apr 14, 2026</span>
    <a href="https://inventory.truelog.com.sg/tickets/sf" target="_blank" class="btn btn-ghost">Open TrueLog ↗</a>
  </div>
</div>

<div class="stats" id="statsRow"></div>

<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="search" placeholder="Search tickets…" oninput="applyFilters()" />
  </div>
  <select class="filter-sel" id="catFilter" onchange="applyFilters()">
    <option value="">All Categories</option>
    <option>Asset Intake</option>
    <option>Asset Checkout</option>
    <option>Asset Return</option>
    <option>Correction</option>
    <option>General</option>
  </select>
  <select class="filter-sel" id="statusFilter" onchange="applyFilters()">
    <option value="">All Statuses</option>
  </select>
  <span class="results" id="resultsLabel"></span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th onclick="sortBy('id')"        data-col="id">       Ticket <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('subject')"   data-col="subject">  Subject <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('category')"  data-col="category"> Category <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('outStatus')" data-col="outStatus">Outbound Status <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('outDate')"   data-col="outDate">  Outbound Date <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('inStatus')"  data-col="inStatus"> Inbound Status <span class="sort-icon">↕</span></th>
        <th onclick="sortBy('received')"  data-col="received"> Received <span class="sort-icon">↕</span></th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div class="empty" id="empty"><div class="empty-icon">🎫</div><p>No tickets match your search.</p></div>
</div>

// ── Status colours ──
const COLORS = {
  delivered:"#06b6d4", pending:"#f97316", "in transit":"#f59e0b",
  "label generated":"#6366f1", "at hfd":"#8b5cf6", singpost:"#3b82f6",
  received:"#10b981", resolved:"#10b981", cancelled:"#ef4444",
  "in progress":"#f59e0b", new:"#3b82f6",
};
function sc(s=""){const l=s.toLowerCase();for(const[k,v]of Object.entries(COLORS))if(l.includes(k))return v;return"#6b7280";}
function pill(t){if(!t||t==="-")return`<span style="color:var(--muted)">—</span>`;const c=sc(t);return`<span class="pill" style="background:${c}22;color:${c}" title="${t}">${t}</span>`;}

// ── Sort state ──
let sortCol="id", sortDir=-1, activeStat=null;

// ── Build status filter dropdown ──
function buildStatusFilter(){
  const statuses=[...new Set(TICKETS.map(t=>t.outStatus).filter(s=>s&&s!=="-"))].sort();
  const sel=document.getElementById("statusFilter");
  sel.innerHTML=`<option value="">All Statuses</option>`+statuses.map(s=>`<option>${s}</option>`).join("");
}

// ── Stats ──
const CAT_COLORS={"Asset Intake":"#10b981","Asset Checkout":"#3b82f6","Asset Return":"#f59e0b","Correction":"#8b5cf6","General":"#6b7280"};
function renderStats(){
  const byOut={};
  TICKETS.forEach(t=>{byOut[t.outStatus]=(byOut[t.outStatus]||0)+1;});
  const sorted=Object.entries(byOut).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const total=`<div class="stat${activeStat===null?' active':''}" style="border-left-color:var(--blue)" onclick="filterByStat(null)"><div class="stat-num">${TICKETS.length}</div><div class="stat-label">Total</div></div>`;
  const cards=sorted.map(([s,n])=>`<div class="stat${activeStat===s?' active':''}" style="border-left-color:${sc(s)}" onclick="filterByStat('${s.replace(/'/g,"\\'")}')"><div class="stat-num">${n}</div><div class="stat-label">${s}</div></div>`).join("");
  document.getElementById("statsRow").innerHTML=total+cards;
}

function filterByStat(val){
  activeStat=val;
  const sel=document.getElementById("statusFilter");
  sel.value=val||"";
  renderStats();
  applyFilters();
}

// ── Render table ──
function renderTable(){
  const data=[...TICKETS].sort((a,b)=>{
    let av=a[sortCol]??"",bv=b[sortCol]??"";
    if(sortCol==="id"){av=parseInt(a.id);bv=parseInt(b.id);}
    else{av=av.toLowerCase();bv=bv.toLowerCase();}
    return av<bv?-sortDir:av>bv?sortDir:0;
  });
  document.querySelectorAll("thead th").forEach(th=>{
    th.classList.remove("sorted");
    const si=th.querySelector(".sort-icon");
    if(th.dataset.col===sortCol){th.classList.add("sorted");if(si)si.textContent=sortDir===1?"↑":"↓";}
    else if(si)si.textContent="↕";
  });
  document.getElementById("tbody").innerHTML=data.map(t=>`
    <tr data-id="${t.id}" data-search="${[t.id,t.subject,t.category,t.outStatus,t.inStatus].join(" ").toLowerCase()}"
        data-status="${t.outStatus}" data-cat="${t.category}"
        onclick="window.open('${BASE}/tickets/${t.id}','_blank')" title="Open in TrueLog">
      <td class="td-id">TICK-${t.id}</td>
      <td class="td-subj" title="${t.subject}">${t.subject}</td>
      <td><span style="color:${CAT_COLORS[t.category]||'var(--subtle)'};font-size:12px;font-weight:600">${t.category}</span></td>
      <td>${pill(t.outStatus)}</td>
      <td class="td-date">${t.outDate!=="-"?t.outDate:"—"}</td>
      <td>${pill(t.inStatus)}</td>
      <td class="td-date">${t.received!=="-"?t.received:"—"}</td>
    </tr>`).join("");
  applyFilters();
}

// ── Filters ──
function applyFilters(){
  const q=document.getElementById("searchInput").value.toLowerCase();
  const st=document.getElementById("statusFilter").value;
  const cat=document.getElementById("catFilter").value;
  const rows=document.querySelectorAll("#tbody tr");
  let vis=0;
  rows.forEach(r=>{
    const show=(!q||r.dataset.search.includes(q))&&(!st||r.dataset.status===st)&&(!cat||r.dataset.cat===cat);
    r.classList.toggle("hidden",!show);
    if(show)vis++;
  });
  document.getElementById("resultsLabel").textContent=vis===TICKETS.length?"":`${vis} of ${TICKETS.length} shown`;
  document.getElementById("empty").style.display=vis===0?"block":"none";
}

// ── Sort ──
function sortBy(col){sortDir=sortCol===col?-sortDir:1;sortCol=col;renderTable();}

// ── Init ──
buildStatusFilter();
renderStats();
renderTable();
</script>
</body>
</html>
